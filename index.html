<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>App Netlify</title>
</head>
<body>
  <h1>✅ App no ar</h1>
  <p>Se você está vendo isso, o Netlify já está funcionando.</p>

  <button onclick="testar()">Testar função</button>

  <pre id="saida"></pre>

  <script>
    async function testar() {
      try {
        const res = await fetch("/.netlify/functions/chat");
        const data = await res.json();
        document.getElementById("saida").textContent =
          JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById("saida").textContent = "Erro ao chamar a função";
      }
    }
  </script>
</body>
</html>
``
