<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Assistente da Primeira Infância</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }
    textarea {
      width: 100%;
      height: 80px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 15px;
      cursor: pointer;
    }
    .resposta {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 15px;
      border-radius: 5px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>🧸 Assistente da Primeira Infância</h1>

  <p>
    Faça uma pergunta sobre cuidados, desenvolvimento ou rotina na primeira infância
    (0 a 6 anos).
  </p>

  <textarea id="pergunta" placeholder="Ex: Meu filho de 3 anos gosta pouco de brincar com outras crianças. Isso é comum?"></textarea>

  <button onclick="enviarPergunta()">Perguntar</button>

  <div id="resposta" class="resposta"></div>

  <script>
    async function enviarPergunta() {
      const pergunta = document.getElementById("pergunta").value;
      const respostaEl = document.getElementById("resposta");

      respostaEl.textContent = "Pensando...";

      try {
        const res = await fetch("/.netlify/functions/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: pergunta
          })
        });

        const data = await res.json();
        respostaEl.textContent = data.reply || "Não foi possível obter uma resposta.";
      } catch (e) {
        respostaEl.textContent = "Erro ao se comunicar com o assistente.";
      }
    }
  </script>
</body>
</html>
